# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: 
          - framework: 'netstandard2.1'
            publishSingleFile: 'False'
          - framework: 'net8.0'
            publishSingleFile: 'True'

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Get tag
      run: |
        echo "BUILD_NUMBER=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
      id: version

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet publish -c Release -o ./publish -f ${{ matrix.target.framework }} -p PublishSingleFile=False

    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.target.framework }}.zip
        path: ${{ github.workspace }}/publish/
    - name: Create ZIP
      uses: montudor/action-zip@v1
      with:
        args: zip -qq -r ${{ matrix.target.framework }}.zip ${{ github.workspace }}/publish

    - name: Create Release
      id: create_release
      uses: actions/create-release@latest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
      with:
        tag_name: r${{ steps.version.outputs.BUILD_NUMBER }}
        release_name: Release r${{ steps.version.outputs.BUILD_NUMBER }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      id: upload-release-asset 
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }} # This pulls from the CREATE RELEASE step above, referencing it's ID to get its outputs object, which include a `upload_url`. See this blog post for more info: https://jasonet.co/posts/new-features-of-github-actions/#passing-data-to-future-steps 
        asset_path: ./${{ matrix.target.framework }}.zip
        asset_name: ${{ matrix.target.framework }}.zip
        asset_content_type: application/zip